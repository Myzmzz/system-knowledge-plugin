# ============================================================================
# dependencies.yaml — 功能依赖边登记表（GENERIC TEMPLATE / 通用模板）
# ----------------------------------------------------------------------------
# 本文件登记功能节点之间的“依赖边”，并为每条边写明原因，使依赖关系可追溯。
# 与 features.yaml 中的 depends_on / used_by 互为补充：features.yaml 记录
# “谁依赖谁”，本文件额外记录“为什么依赖”以及依赖的“类型”。
#
# 用法：把下面的占位边复制一份，改成你自己的依赖关系并删除占位条目。
#       from / to 必须是 kebab-case，且应在 features.yaml 中真实存在。
# ============================================================================

# 根 key 必须是 dependencies，下面是一个“依赖边”对象的列表。
dependencies:
  # ↓↓↓ 这是一个占位示例，请替换成你自己的依赖边并删除本条 ↓↓↓
  # 注意：from / to 都应指向 features.yaml 中真实存在的功能。这里两端都用
  # 占位的 example-feature，等你新增真实功能后请改成真实的上游 -> 下游。
  - from: example-feature       # 上游功能的 featureId（kebab-case）
    to: example-feature         # 下游功能的 featureId（kebab-case）

    # type: 依赖类型（必填）。只能取以下五个值之一：
    #   data     - 数据依赖：下游消费上游产出的数据
    #   state    - 状态依赖：下游依赖上游的状态流转
    #   gate     - 门禁依赖：上游通过/校验后才允许进入下游
    #   ui       - 界面依赖：上游页面 / 组件承载下游入口
    #   external - 外部系统依赖：依赖 Kubernetes、Helm、数据库、第三方 API 等
    type: data

    # reason: 这条依赖存在的原因（可选，但强烈建议填写，便于评审与回归判断）。
    reason: 占位说明：下游功能消费上游功能产出的数据，请替换为真实原因。
